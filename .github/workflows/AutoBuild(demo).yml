name: AutoBuild Atmosphere

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gnupg wget curl g++ git make zip unzip liblz4-tool python3 python3-pip python3-setuptools

    - name: Install devkitPro & Switch Toolchain
      run: |
        # Set up devkitPro apt repository
        sudo wget https://apt.devkitpro.org/install-devkitpro-pacman -O /usr/local/bin/install-devkitpro-pacman
        sudo chmod +x /usr/local/bin/install-devkitpro-pacman
        sudo /usr/local/bin/install-devkitpro-pacman --noconfirm
        
        # Install exact Atmosphere build dependencies via pacman
        sudo /opt/devkitpro/pacman/bin/pacman -Syu --noconfirm \
          switch-dev \
          devkitA64 \
          devkitARM \
          devkitarm-rules \
          switch-tools \
          switch-glm \
          switch-libjpeg-turbo \
          hactool

    - name: Install Python LZ4
      run: |
        python3 -m pip install --break-system-packages lz4

    - name: Compile Atmosphere
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export DEVKITA64=$DEVKITPRO/devkitA64
        make
        
    - name: Package Custom Firmware Build
      run: |
        mkdir -p out/atmosphere/contents
        cp -r out/* out/ || true 
        cd out && zip -r ../atmosphere-custom-build.zip *

    - name: Upload Finished Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Atmosphere-ZBIC-Fix
        path: atmosphere-custom-build.zip
        

name: AutoBuild Atmosphere

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Build Prerequisites
      run: |
        apt-get update
        apt-get install -y zip unzip python3 python3-pip python3-setuptools python3-lz4

    - name: Install Missing Switch Packages
      run: |
        dkp-pacman -Syu --noconfirm \
          switch-dev \
          devkitARM \
          devkitarm-rules \
          switch-tools \
          switch-glm \
          switch-libjpeg-turbo \
          hactool

    - name: Compile Atmosphere
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export DEVKITA64=$DEVKITPRO/devkitA64
        make
        
    - name: Package Custom Firmware Build
      run: |
        mkdir -p out/atmosphere/contents
        cp -r out/* out/ || true 
        cd out && zip -r ../atmosphere-custom-build.zip *

    - name: Upload Finished Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Atmosphere-ZBIC-Fix
        path: atmosphere-custom-build.zip
